services:
  cache:
    image: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    env_file:
      - ./env/redis.env
    healthcheck:
      test: [ "CMD", "redis-cli","ping" ]

  db:
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: postgres -c 'max_connections=500'
    image: postgres:14.5
    env_file:
      - ./env/db.env
    ports:
      - "5433:5432"
    expose:
      - 5432
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  redis_data:
  pgdata:
