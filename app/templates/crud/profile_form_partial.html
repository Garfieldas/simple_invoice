{% include 'partials/page_header.html' with page_title=title page_subtitle="Manage your personal and payment details" %}

<div class="px-4 sm:px-6 lg:px-8">
<div class="max-w-2xl">
    <form method="post" class="space-y-6 bg-white shadow-sm rounded-lg border border-gray-200 p-6">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-200">
            <a href="{% url 'dashboard' %}"
               hx-get="{% url 'dashboard' %}"
               hx-target="#main-content"
               hx-swap="innerHTML"
               hx-push-url="true"
               class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-red-600 border border-transparent rounded-lg hover:bg-red-700">
                Save Profile
            </button>
        </div>
    </form>
</div>
</div>
