{% include 'partials/page_header.html' with page_title=title page_subtitle="Šio veiksmo negalima atšaukti" %}

<div class="px-4 sm:px-6 lg:px-8">
<div class="max-w-lg">
    <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-6">
        <div class="flex items-center space-x-3 mb-4">
            <div class="flex-shrink-0">
                <svg class="h-10 w-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <div>
                <h3 class="text-lg font-medium text-gray-900">Ar tikrai?</h3>
                <p class="text-sm text-gray-500">Ketinate ištrinti <strong>{{ object }}</strong>. Šio veiksmo negalima atšaukti.</p>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-200">
                <a href="{% url cancel_url %}"
                   hx-get="{% url cancel_url %}"
                   hx-target="#main-content"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    Atšaukti
                </a>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-red-600 border border-transparent rounded-lg hover:bg-red-700">
                    Ištrinti
                </button>
            </div>
        </form>
    </div>
</div>
</div>
