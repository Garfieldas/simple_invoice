{% extends 'auth/base_auth.html' %}

{% block title %}Password Reset Complete — Invoice App{% endblock %}
{% block subtitle %}Password reset complete{% endblock %}

{% block content %}
<div class="text-center">
    <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <p class="mt-4 text-sm text-gray-600">
        Your password has been set. You can now sign in with your new password.
    </p>
    <a href="{% url 'login' %}" class="mt-6 inline-flex justify-center rounded-lg bg-red-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-colors">
        Sign in
    </a>
</div>
{% endblock %}
