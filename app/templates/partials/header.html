{% load static %}
<header class="w-full bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex items-center justify-between">
            <!-- Left side: Mobile button + Search -->
            <div class="flex items-center flex-1">
                <!-- Mobile menu button -->
                <button type="button" class="lg:hidden -ml-2 mr-3 text-gray-500 hover:text-gray-700" @click="sidebarOpen = true">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>

                <!-- Search -->
                <div class="w-full max-w-lg">
                    <form class="relative">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                                </svg>
                            </div>
                            <input type="text"
                                   class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-red-500 focus:border-red-500 sm:text-sm"
                                   placeholder="Ieškoti sąskaitų, klientų..."
                                   name="search">
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right side: Actions and user menu -->
            <div class="flex items-center ml-4 space-x-4">
                <!-- Create button -->
                <a href="{% url 'invoice_create' %}"
                   hx-get="{% url 'invoice_create' %}"
                   hx-target="#main-content"
                   hx-swap="innerHTML"
                   hx-push-url="true"
                   class="hidden sm:inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-lg shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    <svg class="-ml-1 mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Nauja sąskaita
                </a>

                <!-- User menu -->
                <div class="relative ml-3" x-data="{ userMenuOpen: false }">
                    <button type="button" class="flex items-center space-x-2 text-sm focus:outline-none" @click="userMenuOpen = !userMenuOpen">
                        <span class="sr-only">Open user menu</span>
                        <div class="h-8 w-8 rounded-full bg-red-600 flex items-center justify-center text-white font-medium">
                            {{ request.user.first_name|default:request.user.email|slice:":1"|upper }}
                        </div>
                        <svg class="hidden sm:block h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <!-- Dropdown -->
                    <div
                        x-show="userMenuOpen"
                        @click.outside="userMenuOpen = false"
                        x-transition:enter="transition ease-out duration-100"
                        x-transition:enter-start="transform opacity-0 scale-95"
                        x-transition:enter-end="transform opacity-100 scale-100"
                        x-transition:leave="transition ease-in duration-75"
                        x-transition:leave-start="transform opacity-100 scale-100"
                        x-transition:leave-end="transform opacity-0 scale-95"
                        class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 ring-1 ring-black ring-opacity-5"
                        style="display: none;">
                        <a href="{% url 'profile_edit' %}"
                           hx-get="{% url 'profile_edit' %}"
                           hx-target="#main-content"
                           hx-swap="innerHTML"
                           hx-push-url="true"
                           class="block px-4 py-2 text-sm text-gray-700 hover:bg-red-50 hover:text-red-700">Jūsų profilis</a>
                        <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-red-50 hover:text-red-700">Atsijungti</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
