{% load form_tags %}
<div>
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
    {{ field|add_class:"block w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 focus:border-red-500 focus:outline-none focus:ring-1 focus:ring-red-500 sm:text-sm" }}
    {% if field.errors %}
    <p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>
    {% endif %}
</div>
